<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — ContaIA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090f; --surface: #111118; --surface-2: #18181f;
      --border: rgba(255,255,255,.07); --border-2: rgba(255,255,255,.12);
      --gold: #d4a843; --gold-dim: rgba(212,168,67,.12);
      --text: #e8e8e0; --text-dim: #888; --text-faint: #555;
      --red: #ef4444; --red-dim: rgba(239,68,68,.12);
      --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-wrap { width: 100%; max-width: 420px; }

    .brand { text-align: center; margin-bottom: 32px; }
    .brand-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
    }
    .brand-name span { color: var(--gold); }
    .brand-tagline {
      font-size: .85rem;
      color: var(--text-faint);
      margin-top: 5px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: .83rem;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 5px;
    }
    .form-control {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 13px;
      font-size: .9rem;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    .form-control:focus { border-color: var(--gold); }
    .form-control::placeholder { color: var(--text-faint); }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 20px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 8px;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: .88; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(0,0,0,.25);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: .82rem;
      margin-bottom: 14px;
      display: none;
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,.25);
      color: #fca5a5;
    }
    .alert.show { display: block; }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: .82rem;
      color: var(--text-faint);
    }
    .auth-footer a { color: var(--gold); }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="brand">
    <div class="brand-name">Conta<span>IA</span></div>
    <div class="brand-tagline">Copiloto de IA para escritórios contábeis</div>
  </div>

  <div class="card">
    <div class="card-title">Entrar na sua conta</div>
    <div class="card-sub">Bem-vindo de volta.</div>

    <div class="alert" id="alert-msg"></div>

    <div class="form-group">
      <label class="form-label" for="email">E-mail</label>
      <input class="form-control" type="email" id="email" placeholder="seu@email.com" autocomplete="email" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Senha</label>
      <input class="form-control" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btn-login" onclick="login()">
      <span id="btn-text">Entrar</span>
      <div class="spinner" id="spinner" style="display:none"></div>
    </button>
  </div>

  <div class="auth-footer">
    Ainda não tem conta? <a href="/register">Criar conta grátis</a>
  </div>
</div>

<script>
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('password').value;
    const btn   = document.getElementById('btn-login');
    const alert = document.getElementById('alert-msg');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');

    if (!email || !pwd) { showError('Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Entrando…';
    alert.classList.remove('show');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pwd }),
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = data.admin ? '/admin/' : '/dashboard';
      } else {
        showError(data.error || 'Erro ao entrar.');
      }
    } catch {
      showError('Erro de conexão. Tente novamente.');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Entrar';
    }
  }

  function showError(msg) {
    const el = document.getElementById('alert-msg');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
